<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Report | {{ disease }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .report-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="py-12 px-4">

    <div class="max-w-3xl mx-auto report-card overflow-hidden">

        <div class="bg-emerald-600 p-6 text-white flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🌿</span>
                <span class="font-bold tracking-tight uppercase text-sm">Plant Health Scan Result</span>
            </div>
            <span class="text-xs bg-emerald-700 px-3 py-1 rounded-full font-medium">Ref ID: #{{ 12345|random }}</span>
        </div>

        <div class="p-8 md:p-12">
            <div class="flex flex-col md:flex-row gap-10">

                <div class="w-full md:w-1/3 text-center">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Analyzed Sample</h3>
                    <div class="relative inline-block">
                        <img src="{{ image_path }}"
                            class="rounded-xl w-full h-auto shadow-md border-4 border-slate-50 object-cover aspect-square"
                            alt="Analyzed Leaf">
                        <div class="absolute inset-0 border-2 border-emerald-500/30 rounded-xl pointer-events-none">
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-2/3 space-y-6">
                    <div>
                        <h3 class="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-1">Diagnosis</h3>
                        <h1 class="text-4xl font-extrabold text-slate-900 leading-tight">
                            {{ disease }}
                        </h1>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-slate-600">AI Confidence Level</span>
                            <span
                                class="text-sm font-bold {% if confidence > 80 %}text-emerald-600{% else %}text-amber-600{% endif %}">
                                {{ confidence }}%
                            </span>
                        </div>
                        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full transition-all duration-1000"
                                style="width: {{ confidence }}%"></div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center">
                            <svg class="w-4 h-4 mr-1 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                    clip-rule="evenodd"></path>
                            </svg>
                            Recommended Action
                        </h3>
                        <div class="p-5 bg-emerald-50 rounded-2xl border border-emerald-100">
                            <p class="text-slate-700 leading-relaxed font-medium italic">
                                "{{ recommendation }}"
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="mt-12 pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                <button onclick="window.print()"
                    class="text-slate-500 hover:text-slate-800 text-sm font-semibold flex items-center transition-colors">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                    Download Report (PDF)
                </button>

                <a href="/disease/"
                    class="group bg-slate-900 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-200 flex items-center">
                    Analyze Another Sample
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <p class="text-center text-slate-400 text-xs mt-8">
        © 2026 PlantHealth AI Systems • Agricultural Research Division
    </p>

</body>

</html>
