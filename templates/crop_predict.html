<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>AgroTech Crop Recommendation</title>

	<link rel="stylesheet" href="../static/css/bootstrap.min.css">
	<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

	<style>
		body {
			background-color: #f4f6f8;
		}

		form {
			max-width: 420px;
			margin: 60px auto;
			background: white;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
		}

		input {
			width: 100%;
			padding: 10px;
			margin-bottom: 12px;
			border-radius: 4px;
			border: 1px solid #ccc;
		}

		button {
			width: 100%;
			padding: 10px;
			background: #28a745;
			color: white;
			border: none;
			border-radius: 4px;
		}

		h2 {
			text-align: center;
			margin-top: 20px;
		}
	</style>
</head>

<body>

	<div class="container">
		<form method="POST">
			{% csrf_token %}

			<h4 class="text-center">Crop Recommendation</h4>

			<input name="N" type="number" step="any" placeholder="Nitrogen" required>
			<input name="P" type="number" step="any" placeholder="Phosphorus" required>
			<input name="K" type="number" step="any" placeholder="Potassium" required>
			<input name="temperature" type="number" step="any" placeholder="Temperature" required>
			<input name="humidity" type="number" step="any" placeholder="Humidity" required>
			<input name="ph" type="number" step="any" placeholder="pH" required>
			<input name="rainfall" type="number" step="any" placeholder="Rainfall" required>

			<button type="submit">Predict Crop</button>
		</form>
	</div>

	<script>
		document.addEventListener("DOMContentLoaded", function () {

			{% if recomm %}
			const location = "{{ location|escapejs }}";
			const temperature = "{{ temperature }}";
			const humidity = "{{ humidity }}";
			const recomm = "{{ recomm|escapejs }}";

			swal({
				title: "Crop Recommendation",
				content: {
					element: "div",
					attributes: {
						innerHTML: `
                    <p>Location: ${location}</p>
                    <p>Temperature: ${temperature}°C</p>
                    <p>Humidity: ${humidity}%</p>
                    <hr>
                    <h4>Recommended Crop: ${recomm}</h4>
                `
					}
				},
				icon: "success"
			});
			{% endif %}

		});
	</script>

</body>

</html>
